<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BUREAU PARIS EFOOTBALL</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:Arial }
  body { background:#000; color:#fff; padding-bottom:80px }
  .header { background:linear-gradient(90deg, #FFD700, #B8860B); padding:15px; display:flex; justify-content:space-between; align-items:center; font-weight:bold; color:#000 }
  .btn { padding:12px; border:none; border-radius:10px; cursor:pointer; font-weight:bold; width:100%; margin:5px 0; font-size:16px }
  .btn-yellow { background:#FFD700; color:#000 }
  .btn-green { background:#00FF00; color:#000 }
  .btn-red { background:#FF0000; color:#fff }
  .btn-blue { background:#00AEEF; color:#fff }
  .card { background:#111; border:2px solid #FFD700; border-radius:15px; padding:15px; margin:15px }
  input { padding:12px; width:100%; margin:8px 0; border-radius:8px; border:1px solid #333; background:#222; color:#fff; font-size:16px }
  .nav { position:fixed; bottom:0; width:100%; background:#111; display:flex; justify-content:space-around; padding:10px 0; border-top:2px solid #FFD700 }
  .nav-item { text-align:center; font-size:12px; cursor:pointer; color:#888 }
  .nav-item.active { color:#FFD700 }
  .solde { background:#222; padding:15px; border-radius:10px; text-align:center; margin:10px 0 }
  .solde span { color:#00FF00; font-size:24px; font-weight:bold }
  h2 { margin-bottom:10px; color:#FFD700 }
</style>
</head>
<body>

<div class="header">
  <div>💰 BUREAU PARIS EFOOTBALL</div>
  <div>
    <span style="background:red; padding:8px; border-radius:50%; cursor:pointer" onclick="showPage('admin')">⚙️</span>
    <span style="background:green; padding:8px; border-radius:50%; cursor:pointer; margin-left:5px" onclick="showPage('depot')">+</span>
  </div>
</div>

<div id="app"></div>

<div class="nav">
  <div class="nav-item" onclick="showPage('paris')"><div>📋</div><div>Paris</div></div>
  <div class="nav-item" onclick="showPage('lancer')"><div>🎯</div><div>Lancer</div></div>
  <div class="nav-item" onclick="showPage('joueurs')"><div>🟢</div><div>Joueurs</div></div>
  <div class="nav-item active" onclick="showPage('profil')"><div>👤</div><div>Profil</div></div>
  <div class="nav-item" onclick="showPage('notif')"><div>🔔</div><div>Notif</div></div>
</div>

<script>
// 1. COLLE ICI TES INFOS SUPABASE
const supabaseUrl = 'https://uuzempozenvhgchkdsom.supabase.co'
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV1emVtcG96ZW52aGdjaGtkc29tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3MDIxOTUsImV4cCI6MjA5OTI3ODE5NX0._TARYyMF_EevbpaGXY3xGnN0A7KQr4hRNA6Rd0pebuw'
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey)

let currentUser = null;

// 2. VERIFIER SI CONNECTE
async function checkUser() {
  const { data: { user } = await supabase.auth.getUser()
  currentUser = user;
  if(user) showPage('profil')
  else showPage('login')
}

// 3. INSCRIPTION
async function signup() {
  const nom = document.getElementById('nom').value
  const email = document.getElementById('email').value
  const password = document.getElementById('password').value
  const { data, error } = await supabase.auth.signUp({email, password})
  if(error) return alert(error.message)
  await supabase.from('profiles').insert([{id:data.user.id, nom:nom, email:email, solde:0}])
  alert('Compte créé ! Connecte toi')
  showPage('login')
}

// 4. CONNEXION
async function login() {
  const email = document.getElementById('email').value
  const password = document.getElementById('password').value
  const { error } = await supabase.auth.signInWithPassword({email, password})
  if(error) return alert(error.message)
  checkUser()
}

// 5. DECONNEXION
async function logout() {
  await supabase.auth.signOut()
  checkUser()
}

// 6. AFFICHAGE DES PAGES
function showPage(page) {
  let html = '';
  
  if(page == 'login') {
    html = `<div class="card"><h2>🔑 Connexion</h2>
      <input id="email" placeholder="Ton Gmail">
      <input id="password" type="password" placeholder="Mot de passe">
      <button class="btn btn-yellow" onclick="login()">SE CONNECTER</button>
      <p style="text-align:center; margin-top:10px">Pas de compte? <span style="color:#FFD700; cursor:pointer" onclick="showPage('signup')">S'inscrire</span></p>
    </div>`
  }
  
  if(page == 'signup') {
    html = `<div class="card"><h2>📝 Inscription</h2>
      <input id="nom" placeholder="Nom et Prénom">
      <input id="email" placeholder="Gmail">
      <input id="password" type="password" placeholder="Mot de passe">
      <button class="btn btn-green" onclick="signup()">CRÉER MON COMPTE</button>
      <p style="text-align:center; margin-top:10px"><span style="color:#FFD700; cursor:pointer" onclick="showPage('login')">Déjà un compte ?</span></p>
    </div>`
  }

  if(page == 'profil') {
    html = `<div class="card"><h2>👤 Mon Profil</h2>
      <p><b>Nom:</b> Ezéchiel Yao</p>
      <p><b>Gmail:</b> ${currentUser?.email}</p>
      <div class="solde">Solde: <br><span>102 000 FCFA</span></div>
      <button class="btn btn-red" onclick="logout()">DÉCONNEXION</button>
    </div>`
  }

  if(page == 'paris') html = `<div class="card"><h2>📋 Paris en cours</h2><p>Aucun pari en cours pour le moment...</p></div>`
  
  if(page == 'lancer') html = `<div class="card"><h2>🎯 Lancer un Pari</h2>
    <input placeholder="Mise en FCFA - Min 1000">
    <input placeholder="Numéro de la salle eFootball">
    <button class="btn btn-yellow">LANCER LE PARI</button>
  </div>`
  
  if(page == 'joueurs') html = `<div class="card"><h2>🟢 Joueurs en Ligne</h2><p>Ezéchiel - En ligne</p></div>`
  
  if(page == 'notif') html = `<div class="card"><h2>🔔 Notifications</h2><p>Aucune notification</p></div>`
  
  if(page == 'admin') html = `<div class="card"><h2>⚙️ Panneau Admin</h2>
    <p>Créditer un joueur :</p>
    <input placeholder="Gmail du joueur">
    <input placeholder="Montant FCFA à ajouter">
    <button class="btn btn-green">CRÉDITER</button>
  </div>`
  
  if(page == 'depot') html = `<div class="card"><h2>+ Dépôt</h2>
    <p>Pour recharger ton compte envoie sur :</p>
    <h3 style="color:#FFA500; text-align:center">0757652282</h3>
    <button class="btn btn-yellow">🟠 Orange Money</button>
    <button class="btn btn-blue">🔵 Wave</button>
    <h3>📸 Envoyer la preuve</h3>
    <input placeholder="Montant déposé en FCFA">
    <input placeholder="Ton numéro qui a envoyé">
    <button class="btn btn-yellow">ENVOYER LA PREUVE</button>
  </div>`

  document.getElementById('app').innerHTML = html;
  
  // Active le bon menu
  document.querySelectorAll('.nav-item').forEach((el,i) => {
    el.classList.remove('active')
    const pages = ['paris','lancer','joueurs','profil','notif']
    if(pages.indexOf(page) == i) el.classList.add('active')
  })
}

checkUser()
</script>
</body>
</html
